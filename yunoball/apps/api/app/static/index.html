<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YunoBall — NFL answers (demo)</title>
  <style>
    :root { --bg:#0b0e14; --panel:#151a23; --border:#232a36; --text:#e6e9ef; --muted:#8b94a3; --accent:#4ade80; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    main { max-width: 820px; margin: 0 auto; padding: 64px 20px 120px; }
    h1 { font-size: 40px; margin: 0 0 4px; }
    .accent { color: var(--accent); }
    .sub { color: var(--muted); margin: 0 0 24px; }
    input { width:100%; padding:14px 16px; font-size:18px; background:var(--panel); border:1px solid var(--border); border-radius:12px; color:var(--text); }
    .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .chip { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:999px; padding:6px 12px; font-size:13px; cursor:pointer; }
    .chip:hover { color:var(--text); }
    .narration { font-size:20px; line-height:1.5; margin-top:28px; }
    table { border-collapse: collapse; width:100%; margin-top:12px; }
    th, td { text-align:left; padding:8px 12px; border-bottom:1px solid var(--border); }
    th { color:var(--muted); font-weight:600; }
    .reveal { margin-top:16px; background:transparent; border:none; color:var(--accent); cursor:pointer; padding:0; font-size:13px; }
    pre { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; overflow-x:auto; font-size:13px; }
    .err { color:#f87171; }
    .badge { font-size:12px; color:var(--muted); border:1px solid var(--border); border-radius:999px; padding:2px 8px; margin-left:8px; }
  </style>
</head>
<body>
  <main>
    <h1>Yuno<span class="accent">Ball</span><span class="badge" id="mode">demo</span></h1>
    <p class="sub">Ask anything about NFL history — every answer shows the query behind it.</p>

    <input id="q" placeholder="Ask an NFL question…" autofocus />
    <div class="chips" id="chips"></div>

    <div id="out"></div>
  </main>

  <script>
    const API = location.origin;
    const examples = [
      "Who threw the most touchdowns in 2023?",
      "Patrick Mahomes career passing yards",
      "Most rushing yards in a single game",
      "Most receiving yards in 2023",
    ];
    const chips = document.getElementById("chips");
    examples.forEach(ex => {
      const b = document.createElement("button");
      b.className = "chip"; b.textContent = ex;
      b.onclick = () => { document.getElementById("q").value = ex; ask(ex); };
      chips.appendChild(b);
    });

    fetch(API + "/health").then(r => r.json()).then(h => {
      document.getElementById("mode").textContent = h.demo_mode ? "demo" : "live";
    }).catch(() => {});

    const q = document.getElementById("q");
    q.addEventListener("keydown", e => { if (e.key === "Enter" && q.value.trim()) ask(q.value.trim()); });

    async function ask(question) {
      const out = document.getElementById("out");
      out.innerHTML = '<p class="sub">Thinking…</p>';
      try {
        const res = await fetch(API + "/api/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        if (!res.ok) throw new Error("Request failed (" + res.status + ")");
        render(await res.json());
      } catch (err) {
        out.innerHTML = '<p class="err">' + err.message + '</p>';
      }
    }

    function render(r) {
      const out = document.getElementById("out");
      let html = '<p class="narration">' + escapeHtml(r.narration) + '</p>';
      if (r.rows && r.rows.length) {
        html += '<table><thead><tr>' + r.columns.map(c => '<th>' + escapeHtml(c) + '</th>').join('') + '</tr></thead><tbody>';
        html += r.rows.map(row => '<tr>' + r.columns.map(c => '<td>' + escapeHtml(String(row[c] ?? '')) + '</td>').join('') + '</tr>').join('');
        html += '</tbody></table>';
      }
      html += '<button class="reveal" onclick="toggleSql()">Show / hide the query behind this answer</button>';
      html += '<pre id="sql" style="display:none">' + escapeHtml(r.sql) + '</pre>';
      out.innerHTML = html;
    }

    function toggleSql() {
      const el = document.getElementById("sql");
      el.style.display = el.style.display === "none" ? "block" : "none";
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    }
  </script>
</body>
</html>
