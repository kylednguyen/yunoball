# Fly.io deploy for the YunoBall API.
#   cd apps/api
#   fly launch --no-deploy        # creates the app (edit name/region as needed)
#   fly secrets set DATABASE_URL=... READONLY_DATABASE_URL=... OPENAI_API_KEY=...
#   fly deploy
app = "yunoball-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "2s"

[env]
  PORT = "8080"
