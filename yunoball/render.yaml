# Render blueprint — one-click deploy of the YunoBall API (persistent container).
# Frontend deploys separately on Vercel (see docs/DEPLOYMENT.md).
#
#   render.com → New → Blueprint → point at this repo.
#   Then set DATABASE_URL / READONLY_DATABASE_URL (and optionally OPENAI_API_KEY)
#   in the dashboard — they are marked sync:false so they are never committed.
services:
  - type: web
    name: yunoball-api
    runtime: python
    rootDir: apps/api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # Supabase pooled connection
      - key: READONLY_DATABASE_URL
        sync: false          # read-only role for generated SQL
      - key: OPENAI_API_KEY
        sync: false          # optional — rule-based engine works without it
      - key: CORS_ORIGINS
        sync: false          # JSON array of allowed origins, e.g. ["https://yunoball-web.vercel.app"]
      - key: RATE_LIMIT_PER_MINUTE
        value: "30"          # per-IP cap on POST /api/search (0 disables)
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: yunoball-redis
          property: connectionString

  - type: keyvalue
    name: yunoball-redis
    plan: free
    ipAllowList: []          # only reachable from Render services
