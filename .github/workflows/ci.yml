name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DATABASE_URL: postgresql://yunoball:yunoball@localhost:5432/yunoball

jobs:
  server-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yunoball
          POSTGRES_PASSWORD: yunoball
          POSTGRES_DB: yunoball
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U yunoball" --health-interval 5s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm --filter @yunoball/server test
        env:
          TEST_ADMIN_DATABASE_URL: postgresql://yunoball:yunoball@localhost:5432/yunoball

  web-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yunoball
          POSTGRES_PASSWORD: yunoball
          POSTGRES_DB: yunoball
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U yunoball" --health-interval 5s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      # Real nflverse data. The e2e suite asserts against 2023 (leaders,
      # standings, player ranks) and 2024 (season-switch), so both must be
      # loaded — a 2023-only or 2024-only warehouse fails the suite.
      - run: pnpm ingest:nfl --years 2023 2024
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      # Playwright boots both servers itself (playwright.config.ts webServer):
      # the Express API on :4000 and next dev on :3000.
      - run: pnpm e2e
        working-directory: apps/web
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
