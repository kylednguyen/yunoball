name: Ingest nflverse

on:
  schedule:
    - cron: "0 10 * * 2" # Tuesdays 10:00 UTC, after MNF stats land
  workflow_dispatch:
    inputs:
      season:
        description: "Season to ingest (default: current)"
        required: false

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm ingest:nfl ${{ inputs.season && format('--season {0}', inputs.season) || '' }}
        env:
          DATABASE_URL: ${{ secrets.INGEST_DATABASE_URL }}
