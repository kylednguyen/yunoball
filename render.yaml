# Render blueprint — one-click deploy of the YunoBall API as a Docker container.
# Frontend deploys separately on Vercel (see docs/DEPLOYMENT.md).
#
#   render.com → New → Blueprint → point at this repo.
#   Render builds ./Dockerfile and runs the container. Then set the sync:false
#   secrets in the dashboard — they are never committed.
services:
  - type: web
    name: yunoball-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /ready   # readiness — verifies Postgres is reachable (see app.ts)
    envVars:
      - key: DATABASE_URL
        sync: false          # Supabase SESSION pooler (…pooler.supabase.com:5432) — this is a
                             # persistent server, not serverless; do NOT use the :6543 txn pooler
      - key: READONLY_DATABASE_URL
        sync: false          # read-only role for engine-executed SQL (falls back to DATABASE_URL)
      - key: CORS_ORIGINS
        sync: false          # comma-separated origins, e.g. https://yunoball-web.vercel.app
      - key: RATE_LIMIT_PER_MINUTE
        value: "30"          # per-IP cap on POST /api/search and /api/agent (0 disables)
      - key: ANSWER_CACHE_TTL_SECONDS
        value: "86400"       # TTL for cached answers in answer_cache (24h)
      - key: LOG_LEVEL
        value: "info"        # pino log level: fatal|error|warn|info|debug|trace|silent
