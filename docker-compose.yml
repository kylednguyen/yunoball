# Local dev infrastructure: Postgres (with pgvector).
# The API (Express) and web (Next.js) run on the host against this.
#
#   docker compose up -d
#   # then: pnpm db:migrate
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: yunoball
      POSTGRES_PASSWORD: yunoball
      POSTGRES_DB: yunoball
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yunoball"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
