[project]
name = "yunoball-db"
version = "0.0.0"
description = "YunoBall warehouse schema (SQLAlchemy models + Alembic migrations)."
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.2",
    "pgvector>=0.3.6",
    "alembic>=1.14",
    "python-dotenv>=1.0",
]

[project.scripts]
yunoball-provision-readonly = "yunoball_db.provision:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["yunoball_db*"]
