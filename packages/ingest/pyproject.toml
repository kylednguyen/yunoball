[project]
name = "yunoball-ingest"
version = "0.0.0"
description = "Load nflverse data into the YunoBall Postgres warehouse."
requires-python = ">=3.11"
dependencies = [
    # nflreadpy is the maintained nflverse loader (polars-based; no pandas pin).
    "nflreadpy>=0.1.5",
    "pandas>=1.5",
    "pyarrow>=14",  # polars.to_pandas()
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.2",
    "python-dotenv>=1.0",
    "tqdm>=4.66",
    # Shared warehouse schema + engine (install editable in dev):
    #   pip install -e ../db
    "yunoball-db",
]

[project.scripts]
yunoball-ingest = "yunoball_ingest.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["yunoball_ingest*"]
