[project]
name = "yunoball-ingest"
version = "0.0.0"
description = "Load nflverse data into the YunoBall Postgres warehouse."
# nfl_data_py 0.3.3 hard-pins pandas<2.0 / numpy<2.0, whose wheels only exist
# through CPython 3.11 — so this package (and the shared dev venv) runs on 3.11.
requires-python = ">=3.11,<3.12"
dependencies = [
    "nfl_data_py>=0.3.3",
    "pandas>=1.5,<2.0",
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.2",
    "python-dotenv>=1.0",
    "tqdm>=4.66",
    # Shared warehouse schema + engine (install editable in dev):
    #   pip install -e ../db
    "yunoball-db",
]

[project.scripts]
yunoball-ingest = "yunoball_ingest.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["yunoball_ingest*"]
